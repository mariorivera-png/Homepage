<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mario Search</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="icon" href="assets/icons/favicon.ico" />
    </head>
    <body>
        <div class="head">
            <h1>Mario Search</h1>
        </div>
        <div class="inpt">
            <input
                type="search"
                id="searchInput"
                placeholder="!bang!bang2 search term"
                size="50"
                autofocus
            />
        </div>

        <div
            id="lst"
            style="color: gray;
            font-family: "NerdFontSymbols";
        ></div>
        <!--div class="new">
            <a href="additions.html">Add New Bang</a>
        </div--->
        <script src="js/bangs.js"></script>
        <script>
            function parseBangs(input) {
                const availableBangs = Object.keys(bangs);
                let remainingInput = input;
                let foundBangs = [];

                // Keep trying to match bangs from the beginning
                while (remainingInput.length > 0) {
                    let matched = false;

                    // Try to find a bang at the current position
                    for (let bang of availableBangs) {
                        if (remainingInput.startsWith(bang + " ")) {
                            foundBangs.push(bang);
                            remainingInput = remainingInput.substring(bang.length + 1).trim();
                            matched = true;
                            break;
                        } else if (remainingInput.startsWith(bang)) {
                            // Check if this is immediately followed by another bang or space
                            const nextChar = remainingInput[bang.length];
                            if (nextChar === undefined || nextChar === ' ' || nextChar === '!') {
                                foundBangs.push(bang);
                                remainingInput = remainingInput.substring(bang.length);
                                matched = true;
                                break;
                            }
                        }
                    }

                    // If no bang matched, break out of the loop
                    if (!matched) {
                        break;
                    }
                }

                // If we found bangs, the remaining input is the search term
                // Otherwise, treat the whole input as search term
                if (foundBangs.length > 0) {
                    return { bangs: foundBangs, searchTerm: remainingInput.trim() };
                } else {
                    return { bangs: [], searchTerm: input };
                }
            }

            function performSearch() {
                let input = document.getElementById("searchInput").value;
                if (!input.trim()) {
                    alert("Plz Enter search term");
                    return;
                }

                const { bangs: foundBangs, searchTerm } = parseBangs(input);
                const inputElement = document.getElementById("searchInput");

                // If no bangs found, use Google search
                if (foundBangs.length === 0) {
                    inputElement.classList.remove("bold-text");
                    const url = "https://www.google.com/search?q=" + encodeURIComponent(input);
                    window.location.href = url;
                    return;
                }

                // If we have bangs, process them
                inputElement.classList.add("bold-text");

                // If search term is empty, show alert
                if (!searchTerm) {
                    alert("Please enter a search term after the bangs");
                    return;
                }

                // Collect all valid URLs
                const urls = [];
                const invalidBangs = [];

                for (let bangCode of foundBangs) {
                    // Check if the bang exists in our bangs object
                    if (bangs[bangCode]) {
                        const url = bangs[bangCode].replace(
                            "{search}",
                            encodeURIComponent(searchTerm)
                        );
                        urls.push(url);
                    } else {
                        invalidBangs.push(bangCode);
                    }
                }

                // Show warning for invalid bangs
                if (invalidBangs.length > 0) {
                    alert(`Warning: The following bangs were not found: ${invalidBangs.join(', ')}`);
                }

                // Open all valid URLs in new tabs
                if (urls.length > 0) {
                    for (let i = 0; i < urls.length; i++) {
                        if (i === 0) {
                            // Open first URL in current tab
                            window.location.href = urls[i];
                        } else {
                            // Open remaining URLs in new tabs
                            window.open(urls[i], '_blank');
                        }
                    }
                } else {
                    // If no valid bangs found, fall back to Google
                    alert("No valid bangs found. Searching on Google instead.");
                    const url = "https://www.google.com/search?q=" + encodeURIComponent(searchTerm || input);
                    window.location.href = url;
                }
            }

            document
                .getElementById("searchInput")
                .addEventListener("keypress", function (e) {
                    if (e.key === "Enter") {
                        performSearch();
                    }
                });
        </script>
        <script src="js/list.js"></script>
    </body>
</html>
