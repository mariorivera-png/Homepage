<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Add Bangs</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="icon" href="assets/icons/favicon.ico" />
    </head>
    <body>
        <div class="head">
            <h1>Add Bang</h1>
        </div>
        <div class="input-section">
            <h3>Add New Command</h3>
            <div class="input-group">
                <label for="command-input">Bang:</label>
                <input type="text" id="command-input" placeholder="!g" />
            </div>
            <div class="input-group">
                <label for="url-input">URL Template:</label>
                <input
                    type="text"
                    id="url-input"
                    placeholder="https://www.google.com/search?q={search}"
                />
            </div>
            <button onclick="addCommand()">Add Command</button>

            <div id="error-message" class="error"></div>
            <div id="success-message" class="success"></div>
        </div>
        <div>
            <button type="button">Add Bang</button>
        </div>
        <div
            id="lst"
            style="color: gray; font-family: &quot;NerdFontSymbols&quot;"
        ></div>

        <script src="js/bangs.js"></script>
        <script src="js/list.js"></script>

        <div class="new">
            <a href="index.html">Back to Search</a>
        </div>
    </body>
</html>
